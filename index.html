<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>투사체 난투 게임 (아이템 UI 개선 버전)</title>
    <style>
        /* 기본 화면 레이아웃 설정 */
        body {
            margin: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 게임 보드 래퍼 */
        #game-wrapper {
            position: relative;
            width: 1000px;
            height: 600px;
        }

        /* 캔버스 화면 */
        canvas {
            border: 4px solid #fff;
            background-color: #111;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 시작 메뉴 창 */
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 1000px;
            height: 600px;
            background-color: rgba(15, 15, 15, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #fff;
            box-sizing: border-box;
            z-index: 999;
        }
        h1 { font-size: 42px; margin-bottom: 5px; }
        
        /* 조작법 안내 테이블 스타일 */
        .controls-table {
            border-collapse: collapse;
            margin: 20px 0 30px 0;
            font-size: 15px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            overflow: hidden;
        }
        .controls-table th, .controls-table td {
            border: 1px solid #444;
            padding: 8px 20px;
        }
        .controls-table th { background-color: #333; color: yellow;}
        .key-badge {
            background: #555;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }
        
        /* 버튼 스타일 */
        .menu-btn {
            font-size: 22px;
            padding: 15px 40px;
            margin: 0 15px;
            cursor: pointer;
            background-color: #444;
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            transition: 0.2s;
        }
        .menu-btn:hover {
            background-color: white;
            color: black;
        }

        /* 엔딩 메시지 */
        #msg { 
            position: absolute; 
            font-size: 45px; 
            font-weight: bold; 
            color: yellow; 
            text-shadow: 3px 3px 5px #000; 
            pointer-events: none; 
            text-align: center; 
            width: 100%; 
            top: 45%; 
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="menu">
            <h1>🎮 투사체 난투 게임</h1>
            <p style="color: #ffeb3b; margin: 0; font-size: 15px;">⚡ <b>[LASER]</b> 아이템: 3회 동안 벽을 관통하는 대형 레이저 공격 (스폰: 9~15초)</p>
            <p style="color: #4da6ff; margin: 5px 0 0 0; font-size: 15px;">🛡️ <b>[SHIELD]</b> 아이템: 10초 동안 적의 공격을 1회 방어하는 쉴드 생성 (스폰: 9~15초)</p>
            
            <table class="controls-table">
                <thead>
                    <tr>
                        <th>플레이어</th>
                        <th>이동 (상 / 하 / 좌 / 우)</th>
                        <th>공격 (발사)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="color: #ff4d4d;">
                        <td><b>Player 1 (Red)</b></td>
                        <td><span class="key-badge">W</span> <span class="key-badge">S</span> <span class="key-badge">A</span> <span class="key-badge">D</span></td>
                        <td><span class="key-badge">Space</span></td>
                    </tr>
                    <tr style="color: #4da6ff;">
                        <td><b>Player 2 (Blue)</b></td>
                        <td><span class="key-badge">↑</span> <span class="key-badge">↓</span> <span class="key-badge">←</span> <span class="key-badge">→</span></td>
                        <td><span class="key-badge">Enter</span></td>
                    </tr>
                    <tr style="color: #5cd65c;">
                        <td><b>Player 3 (Green)</b></td>
                        <td><span class="key-badge">I</span> <span class="key-badge">K</span> <span class="key-badge">J</span> <span class="key-badge">L</span></td>
                        <td><span class="key-badge">O</span></td>
                    </tr>
                </tbody>
            </table>

            <div>
                <button class="menu-btn" onclick="startGame(2)">2인 플레이</button>
                <button class="menu-btn" onclick="startGame(3)">3인 플레이</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div id="msg"></div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const msgDiv = document.getElementById("msg");
const menuDiv = document.getElementById("menu");

// 키보드 입력 관리
const keys = {};
window.addEventListener("keydown", (e) => { 
    keys[e.code] = true; 
    if(["Space", "Enter", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
});
window.addEventListener("keyup", (e) => { keys[e.code] = false; });

const speed = 4;
const bulletSpeed = 7;
const maxLives = 3;

let players = [];
let bullets = [];
let walls = [];
let laserItems = [];    
let shieldItems = [];   
let lasers = [];        
let gameOver = false;
let gameStarted = false;
let playerCount = 2;
let laserSpawnTimeout = null;
let shieldSpawnTimeout = null;

// 플레이어 설계도
class Player {
    constructor(id, x, y, color, controls) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.size = 25;
        this.color = color;
        this.controls = controls;
        this.lives = maxLives;
        this.lastDir = { x: 1, y: 0 };
        this.canShoot = true;
        this.cooldown = 400;
        this.laserCount = 0; 
        
        // 쉴드 관련 속성
        this.hasShield = false;
        this.shieldTimer = 0;
        this.shieldInterval = null;
    }

    update() {
        if (this.lives <= 0) return;

        let moveX = 0;
        let moveY = 0;

        if (keys[this.controls.up]) moveY = -1;
        if (keys[this.controls.down]) moveY = 1;
        if (keys[this.controls.left]) moveX = -1;
        if (keys[this.controls.right]) moveX = 1;

        if (moveX !== 0 && moveY !== 0) {
            moveX *= 0.7071;
            moveY *= 0.7071;
        }

        // X축 벽 충돌 체크
        const originalX = this.x;
        this.x += moveX * speed;
        this.x = Math.max(0, Math.min(canvas.width - this.size, this.x));
        if (checkPlayerWallCollision(this)) this.x = originalX;

        // Y축 벽 충돌 체크
        const originalY = this.y;
        this.y += moveY * speed;
        this.y = Math.max(0, Math.min(canvas.height - this.size, this.y));
        if (checkPlayerWallCollision(this)) this.y = originalY;

        if (moveX !== 0 || moveY !== 0) {
            this.lastDir = { x: moveX, y: moveY };
        }

        // 공격 버튼 입력 시
        if (keys[this.controls.shoot] && this.canShoot) {
            if (this.laserCount > 0) {
                fireLaser(this);
                this.laserCount--;
            } else {
                bullets.push(new Bullet(this.x + this.size/2, this.y + this.size/2, this.lastDir, this.id, this.color));
            }
            
            this.canShoot = false;
            setTimeout(() => { this.canShoot = true; }, this.cooldown);
        }
    }

    // 쉴드 획득 함수
    activateShield() {
        this.hasShield = true;
        this.shieldTimer = 10; 
        
        if (this.shieldInterval) clearInterval(this.shieldInterval);
        
        this.shieldInterval = setInterval(() => {
            if (!gameStarted || gameOver) {
                clearInterval(this.shieldInterval);
                return;
            }
            this.shieldTimer--;
            if (this.shieldTimer <= 0) {
                this.deactivateShield();
            }
        }, 1000);
    }

    deactivateShield() {
        this.hasShield = false;
        if (this.shieldInterval) {
            clearInterval(this.shieldInterval);
            this.shieldInterval = null;
        }
    }

    // 데미지 처리 함수
    takeDamage() {
        if (this.hasShield) {
            this.deactivateShield(); 
            return false; 
        }
        this.lives--;
        return true; 
    }

    draw() {
        if (this.lives <= 0) return;
        
        const centerX = this.x + this.size / 2;
        const centerY = this.y + this.size / 2;

        // 쉴드 이펙트
        if (this.hasShield) {
            ctx.save();
            ctx.strokeStyle = "rgba(77, 166, 255, 0.8)";
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#4da6ff";
            ctx.beginPath();
            ctx.arc(centerX, centerY, this.size, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        // 본체 그리기
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        
        // 조준점 그리기
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(centerX + this.lastDir.x * 8, centerY + this.lastDir.y * 8, 4, 0, Math.PI * 2);
        ctx.fill();

        // 🎯 머리 위 UI 표시 연산 (두 아이템 동시 소지 시 줄바꿈 적용)
        ctx.font = "bold 11px sans-serif";
        ctx.textAlign = "center";
        
        let currentOffsetY = -8; // 텍스트가 쌓일 Y축 오프셋 시작점

        // 1. 쉴드가 있다면 먼저 표시
        if (this.hasShield) {
            ctx.fillStyle = "#4da6ff";
            ctx.fillText(`쉴드 [${this.shieldTimer}초]`, centerX, this.y + currentOffsetY);
            currentOffsetY -= 13; // 다음 텍스트가 표시될 위치를 위로 올림
        }
        
        // 2. 레이저가 있다면 위에 표시
        if (this.laserCount > 0) {
            ctx.fillStyle = "yellow";
            ctx.fillText(`레이저 [${this.laserCount}]`, centerX, this.y + currentOffsetY);
        }

        // 캐릭터 아래에 직관적인 체력(하트) 표현
        ctx.fillStyle = "#ff4d4d"; 
        ctx.font = "14px sans-serif";
        ctx.textAlign = "center";
        let hearts = "";
        for (let i = 0; i < this.lives; i++) {
            hearts += "♥";
        }
        ctx.fillText(hearts, centerX, this.y + this.size + 16);
    }
}

// 투사체 설계도
class Bullet {
    constructor(x, y, dir, ownerId, color) {
        this.x = x;
        this.y = y;
        this.radius = 6;
        const len = Math.sqrt(dir.x * dir.x + dir.y * dir.y);
        this.dx = (dir.x / len) * bulletSpeed;
        this.dy = (dir.y / len) * bulletSpeed;
        this.ownerId = ownerId;
        this.color = color;
        this.distanceTraveled = 0;
        this.maxDistance = 1200;
    }

    update() {
        this.x += this.dx;
        this.y += this.dy;
        this.distanceTraveled += bulletSpeed;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }

    isOutOfBounds() {
        return this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height;
    }
    
    isExpired() {
        return this.distanceTraveled >= this.maxDistance;
    }
}

// 레이저 아이템 클래스
class LaserItem {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 12;
        this.pulse = 0; 
    }

    update() {
        this.pulse += 0.08;
    }

    draw() {
        ctx.save();
        const sizeOffset = Math.sin(this.pulse) * 3;
        
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ff00ff";
        ctx.fillStyle = `rgba(255, 235, 59, ${0.6 + Math.sin(this.pulse * 2) * 0.3})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + sizeOffset, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "cyan";
        ctx.font = "bold 11px monospace";
        ctx.textAlign = "center";
        ctx.fillText("⚡LASER⚡", this.x, this.y - this.radius - 8 + Math.sin(this.pulse) * 2);
        ctx.restore();
    }
}

// 쉴드 아이템 클래스
class ShieldItem {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 12;
        this.pulse = 0;
    }

    update() {
        this.pulse += 0.08;
    }

    draw() {
        ctx.save();
        const sizeOffset = Math.sin(this.pulse) * 3;
        
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#00ffff";
        ctx.fillStyle = `rgba(77, 166, 255, ${0.6 + Math.sin(this.pulse * 2) * 0.3})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + sizeOffset, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#4da6ff";
        ctx.font = "bold 11px monospace";
        ctx.textAlign = "center";
        ctx.fillText("🛡️SHIELD🛡️", this.x, this.y - this.radius - 8 + Math.sin(this.pulse) * 2);
        ctx.restore();
    }
}

// 레이저 빔 이펙트 클래스
class LaserBeam {
    constructor(startX, startY, dirX, dirY, color) {
        this.startX = startX;
        this.startY = startY;
        this.endX = startX + dirX * 1500;
        this.endY = startY + dirY * 1500;
        this.color = color;
        this.alpha = 1.0; 
    }

    update() {
        this.alpha -= 0.07; 
    }

    draw() {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.lineWidth = 18;
        ctx.strokeStyle = "white"; 
        ctx.shadowBlur = 25;
        ctx.shadowColor = this.color; 
        
        ctx.beginPath();
        ctx.moveTo(this.startX, this.startY);
        ctx.lineTo(this.endX, this.endY);
        ctx.stroke();
        
        ctx.lineWidth = 6;
        ctx.strokeStyle = this.color;
        ctx.stroke();
        ctx.restore();
    }
}

// 무작위 장애물 벽 생성
function generateWalls() {
    walls = [];
    const wallCount = Math.floor(Math.random() * 10) + 15; 
    
    const safeZones = [
        {x: 50, y: 250, w: 120, h: 120},  
        {x: 830, y: 250, w: 120, h: 120}, 
        {x: 430, y: 50, w: 140, h: 120}   
    ];

    for (let i = 0; i < wallCount; i++) {
        let width = Math.floor(Math.random() * 80) + 40;
        let height = Math.floor(Math.random() * 80) + 40;
        let x = Math.floor(Math.random() * (canvas.width - width - 100)) + 50;
        let y = Math.floor(Math.random() * (canvas.height - height - 100)) + 50;

        let wall = { x, y, width, height };

        let inSafeZone = false;
        for (let zone of safeZones) {
            if (x < zone.x + zone.w && x + width > zone.x && y < zone.y + zone.h && y + height > zone.y) {
                inSafeZone = true;
                break;
            }
        }

        if (!inSafeZone) {
            walls.push(wall);
        } else {
            i--; 
        }
    }
}

// 🎯 레이저 아이템 스폰 루프 함수 (주기를 9초 ~ 15초로 변경)
function spawnLaserLoop() {
    if (gameOver || !gameStarted) return;

    const randomTime = Math.floor(Math.random() * 6000) + 9000; // 9,000ms ~ 15,000ms

    laserSpawnTimeout = setTimeout(() => {
        if (laserItems.length < 1) { 
            let validPosition = false;
            let itemX = 0, itemY = 0;
            let attempts = 0;

            while (!validPosition && attempts < 100) {
                itemX = Math.floor(Math.random() * (canvas.width - 80)) + 40;
                itemY = Math.floor(Math.random() * (canvas.height - 80)) + 40;
                attempts++;

                let fakePlayer = { x: itemX - 12, y: itemY - 12, size: 24 };
                if (!checkPlayerWallCollision(fakePlayer)) {
                    validPosition = true;
                }
            }

            if (validPosition) {
                laserItems.push(new LaserItem(itemX, itemY));
            }
        }
        spawnLaserLoop(); 
    }, randomTime);
}

// 쉴드 아이템 스폰 루프 함수 (주기: 9초 ~ 15초)
function spawnShieldLoop() {
    if (gameOver || !gameStarted) return;

    const randomTime = Math.floor(Math.random() * 6000) + 9000; // 9,000ms ~ 15,000ms

    shieldSpawnTimeout = setTimeout(() => {
        if (shieldItems.length < 1) { 
            let validPosition = false;
            let itemX = 0, itemY = 0;
            let attempts = 0;

            while (!validPosition && attempts < 100) {
                itemX = Math.floor(Math.random() * (canvas.width - 80)) + 40;
                itemY = Math.floor(Math.random() * (canvas.height - 80)) + 40;
                attempts++;

                let fakePlayer = { x: itemX - 12, y: itemY - 12, size: 24 };
                if (!checkPlayerWallCollision(fakePlayer)) {
                    validPosition = true;
                }
            }

            if (validPosition) {
                shieldItems.push(new ShieldItem(itemX, itemY));
            }
        }
        spawnShieldLoop();
    }, randomTime);
}

// 레이저 충돌 계산 유틸 함수
function checkLaserPlayerCollision(laser, player) {
    const px = player.x + player.size / 2;
    const py = player.y + player.size / 2;
    
    const x1 = laser.startX;
    const y1 = laser.startY;
    const x2 = laser.endX;
    const y2 = laser.endY;

    const l2 = (x2 - x1) ** 2 + (y2 - y1) ** 2;
    if (l2 === 0) return false;

    let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
    t = Math.max(0, Math.min(1, t));

    const projectionX = x1 + t * (x2 - x1);
    const projectionY = y1 + t * (y2 - y1);

    const distSq = (px - projectionX) ** 2 + (py - projectionY) ** 2;
    const hitRadius = (player.size / 2) + 9; 

    return distSq < (hitRadius ** 2);
}

// 레이저 발사 로직 수행
function fireLaser(player) {
    const startX = player.x + player.size / 2;
    const startY = player.y + player.size / 2;
    
    const len = Math.sqrt(player.lastDir.x * player.lastDir.x + player.lastDir.y * player.lastDir.y);
    const dirX = player.lastDir.x / len;
    const dirY = player.lastDir.y / len;

    const newLaser = new LaserBeam(startX, startY, dirX, dirY, player.color);
    lasers.push(newLaser);

    players.forEach(p => {
        if (p.lives > 0 && p.id !== player.id) {
            if (checkLaserPlayerCollision(newLaser, p)) {
                p.takeDamage(); 
            }
        }
    });
}

function drawWalls() {
    ctx.fillStyle = "#555";
    walls.forEach(w => {
        ctx.fillRect(w.x, w.y, w.width, w.height);
    });
}

function checkPlayerWallCollision(player) {
    for (let w of walls) {
        if (player.x < w.x + w.width && player.x + player.size > w.x &&
            player.y < w.y + w.height && player.y + player.size > w.y) {
            return true;
        }
    }
    return false;
}

function checkCircleRectCollision(circle, rect) {
    let closestX = Math.max(rect.x, Math.min(circle.x, rect.x + (rect.size || rect.width)));
    let closestY = Math.max(rect.y, Math.min(circle.y, rect.y + (rect.size || rect.height)));
    let distanceX = circle.x - closestX;
    let distanceY = circle.y - closestY;
    return (distanceX * distanceX + distanceY * distanceY) < (circle.radius * circle.radius);
}

function resolveBulletWallBounce(bullet, w) {
    let overlapLeft = (bullet.x + bullet.radius) - w.x;
    let overlapRight = (w.x + w.width) - (bullet.x - bullet.radius);
    let overlapTop = (bullet.y + bullet.radius) - w.y;
    let overlapBottom = (w.y + w.height) - (bullet.y - bullet.radius);

    let minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

    if (minOverlap === overlapLeft) {
        bullet.dx = -Math.abs(bullet.dx); 
        bullet.x = w.x - bullet.radius;
    } else if (minOverlap === overlapRight) {
        bullet.dx = Math.abs(bullet.dx);  
        bullet.x = w.x + w.width + bullet.radius;
    } else if (minOverlap === overlapTop) {
        bullet.dy = -Math.abs(bullet.dy); 
        bullet.y = w.y - bullet.radius;
    } else if (minOverlap === overlapBottom) {
        bullet.dy = Math.abs(bullet.dy);  
        bullet.y = w.y + w.height + bullet.radius;
    }
}

function startGame(count) {
    playerCount = count;
    gameOver = false;
    laserItems = [];
    shieldItems = [];
    lasers = [];
    bullets = [];
    
    if(laserSpawnTimeout) clearTimeout(laserSpawnTimeout);
    if(shieldSpawnTimeout) clearTimeout(shieldSpawnTimeout);
    
    menuDiv.style.display = "none";
    msgDiv.innerText = "";
    
    players = [
        new Player(1, 100, 300, "#ff4d4d", { up: "KeyW", down: "KeyS", left: "KeyA", right: "KeyD", shoot: "Space" }),
        new Player(2, 880, 300, "#4da6ff", { up: "ArrowUp", down: "ArrowDown", left: "ArrowLeft", right: "ArrowRight", shoot: "Enter" })
    ];

    if (playerCount === 3) {
        players.push(new Player(3, 490, 100, "#5cd65c", { up: "KeyI", down: "KeyK", left: "KeyJ", right: "KeyL", shoot: "KeyO" }));
    }

    generateWalls();
    gameStarted = true;
    
    spawnLaserLoop();
    spawnShieldLoop();
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameStarted) {
        drawWalls();

        // 1. 레이저 아이템 핸들링
        for (let i = laserItems.length - 1; i >= 0; i--) {
            let item = laserItems[i];
            item.update();
            item.draw();

            for (let p of players) {
                if (p.lives > 0) {
                    let dist = Math.sqrt((p.x + p.size/2 - item.x)**2 + (p.y + p.size/2 - item.y)**2);
                    if (dist < (p.size/2 + item.radius)) {
                        p.laserCount = 3; 
                        laserItems.splice(i, 1);
                        break;
                    }
                }
            }
        }

        // 2. 쉴드 아이템 핸들링
        for (let i = shieldItems.length - 1; i >= 0; i--) {
            let item = shieldItems[i];
            item.update();
            item.draw();

            for (let p of players) {
                if (p.lives > 0) {
                    let dist = Math.sqrt((p.x + p.size/2 - item.x)**2 + (p.y + p.size/2 - item.y)**2);
                    if (dist < (p.size/2 + item.radius)) {
                        p.activateShield(); 
                        shieldItems.splice(i, 1);
                        break;
                    }
                }
            }
        }

        // 레이저 빔 이펙트 업데이트 및 그리기
        for (let i = lasers.length - 1; i >= 0; i--) {
            let laser = lasers[i];
            laser.update();
            laser.draw();
            if (laser.alpha <= 0) {
                lasers.splice(i, 1);
            }
        }

        if (!gameOver) {
            players.forEach(p => { p.update(); p.draw(); });

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.update();
                b.draw();

                if (b.isOutOfBounds() || b.isExpired()) {
                    bullets.splice(i, 1);
                    continue;
                }

                let hitWall = false;
                for (let w of walls) {
                    if (checkCircleRectCollision(b, w)) {
                        resolveBulletWallBounce(b, w); 
                        hitWall = true;
                        break; 
                    }
                }
                if (hitWall) continue;

                for (let p of players) {
                    if (p.lives > 0 && b.ownerId !== p.id && checkCircleRectCollision(b, p)) {
                        p.takeDamage(); 
                        bullets.splice(i, 1);
                        break;
                    }
                }
            }

            const alivePlayers = players.filter(p => p.lives > 0);
            if (alivePlayers.length <= 1) {
                gameOver = true;
                if (alivePlayers.length === 1) {
                    msgDiv.innerText = `Player ${alivePlayers[0].id} 승리! (F5를 눌러 재경기)`;
                } else {
                    msgDiv.innerText = "무승부! (F5를 눌러 재경기)";
                }
            }
        } else {
            players.forEach(p => p.draw());
        }
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
